# Early-signal discovery lanes for the AI daily workflow.
#
# The public lanes below are safe for unattended daily preflight runs. Optional
# authenticated lanes should improve quotas or depth only; failures must not
# block the main report pipeline.

request_timeout_seconds = 16
max_items_per_lane = 30
max_total_candidates = 160

[thresholds]
min_total_candidates = 20
min_people_voice = 8
min_product_shadow = 5
min_research_velocity = 8

[optional_auth]
github_token_env = "GITHUB_TOKEN"
github_fallback_token_env = "GH_TOKEN"
huggingface_token_env = "HF_TOKEN"
x_enabled = false
discord_enabled = false

[people_voice]
hn_queries = [
  "AI",
  "LLM",
  "agent",
  "Claude Code",
  "Codex",
  "Cursor",
  "MCP",
  "inference",
  "evals",
]

